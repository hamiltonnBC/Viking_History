<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking Interactive Atlas v2</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
    <div id="app">
        <header id="header">
            <h1>The Viking Age</h1>
            <div id="year-display">750 AD</div>
            <div id="era-label">Pre-Viking Age</div>
        </header>

        <main id="atlas-container">
            <div id="map-holder">
                <svg id="viking-map"></svg>
                <div id="zoom-controls">
                    <button id="zoom-in">+</button>
                    <button id="zoom-out">−</button>
                    <button id="zoom-reset">⟲</button>
                </div>
                <div id="legend"></div>
            </div>

            <div id="info-panel">
                <button id="panel-close">✕</button>
                <div id="panel-content">
                    <div id="panel-header">
                        <h2 id="panel-title">Select an event</h2>
                        <span id="panel-date"></span>
                        <span id="panel-tag"></span>
                    </div>
                    <div id="panel-body">
                        <p>Explore the map and timeline to learn about the Viking Age.</p>
                    </div>
                </div>
            </div>
        </main>

        <footer id="timeline-container">
            <div id="timeline-labels"></div>
            <div id="timeline-wrapper">
                <div id="timeline-track">
                    <div id="timeline-fill"></div>
                    <div id="event-markers"></div>
                </div>
                <input type="range" id="year-slider" min="750" max="1100" value="750" step="1">
            </div>
            <div id="timeline-instructions">⟵ drag the slider to travel through time ⟶</div>
        </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/map.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
